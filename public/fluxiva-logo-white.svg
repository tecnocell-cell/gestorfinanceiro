<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <marker id="cf-trend-arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0,0.5 7,4 0,7.5" fill="white"/>
    </marker>
  </defs>

  <!-- ══ ICON: bar chart + rising trend line, center area ~44x44 ══ -->
  <g transform="translate(2, 4)">
    <!-- Baseline -->
    <line x1="5" y1="38" x2="43" y2="38" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>

    <!-- Bar 1 (shortest) -->
    <rect x="6"  y="30" width="7" height="8"  rx="2" fill="white" opacity="0.38"/>
    <!-- Bar 2 -->
    <rect x="16" y="23" width="7" height="15" rx="2" fill="white" opacity="0.58"/>
    <!-- Bar 3 -->
    <rect x="26" y="15" width="7" height="23" rx="2" fill="white" opacity="0.78"/>
    <!-- Bar 4 (tallest) -->
    <rect x="36" y="6"  width="7" height="32" rx="2" fill="white"/>

    <!-- Rising trend line -->
    <polyline
      points="9,30 19,22 29,14 39,5"
      stroke="white" stroke-width="2.2"
      fill="none" stroke-linecap="round" stroke-linejoin="round"
      marker-end="url(#cf-trend-arr)"/>

    <!-- Dot on trend peak -->
    <circle cx="39" cy="5" r="3.2" fill="white"/>
  </g>

  <!-- ══ LOGOTYPE ══ -->
  <text x="58" y="32"
        font-family="'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="21" font-weight="700" fill="white" letter-spacing="0.5">Fluxiva</text>
</svg>
