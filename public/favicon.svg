<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <marker id="fav-arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polygon points="0,1 8,4.5 0,8" fill="white"/>
    </marker>
    <clipPath id="fav-clip">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#1a5c32"/>

  <!-- Subtle inner gradient overlay via second rect -->
  <rect width="64" height="64" rx="14" fill="#22703e" opacity="0.5"/>

  <g clip-path="url(#fav-clip)">
    <!-- Baseline -->
    <line x1="9" y1="52" x2="55" y2="52" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.25"/>

    <!-- Bar 1 -->
    <rect x="9"  y="42" width="9" height="10" rx="2.5" fill="white" opacity="0.38"/>
    <!-- Bar 2 -->
    <rect x="21" y="33" width="9" height="19" rx="2.5" fill="white" opacity="0.58"/>
    <!-- Bar 3 -->
    <rect x="33" y="22" width="9" height="30" rx="2.5" fill="white" opacity="0.78"/>
    <!-- Bar 4 (tallest) -->
    <rect x="45" y="10" width="9" height="42" rx="2.5" fill="white"/>

    <!-- Rising trend line -->
    <polyline
      points="13,41 25,31 37,20 49,9"
      stroke="white" stroke-width="2.8"
      fill="none" stroke-linecap="round" stroke-linejoin="round"
      marker-end="url(#fav-arr)"/>

    <!-- Peak dot -->
    <circle cx="49" cy="9" r="4" fill="white"/>
  </g>
</svg>
