<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/centerflow-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#013e1f" />
    <title>Fluxiva</title>
    <!-- Handoff landing→app: executa antes do bundle React (auth_token na URL) -->
    <script>
      (function () {
        try {
          var q = new URLSearchParams(window.location.search);
          var token = q.get("auth_token");
          if (!token) return;
          localStorage.setItem("gestor_token", token);
          var userRaw = q.get("auth_user");
          if (userRaw) {
            try { localStorage.setItem("gestor_user", userRaw); } catch (e) {}
          }
          q.delete("auth_token");
          q.delete("auth_user");
          var clean =
            window.location.pathname +
            (q.toString() ? "?" + q.toString() : "") +
            window.location.hash;
          window.history.replaceState(null, "", clean);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
